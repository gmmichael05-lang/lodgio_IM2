{% extends "core/base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 85vh;">
    <div class="card" style="width: 100%; max-width: 420px; animation: popIn 0.3s ease both;">
        <h1 style="text-align: center; color: var(--navy-900); font-weight: 800; font-size: 26px; margin-bottom: 24px;">Create an Account</h1>
        
        {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for message in messages %}
                    <div class="status-badge status-rejected" style="display: block; text-align: center; font-size: 12px; padding: 10px;">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 18px;">
                <label class="form-label">Full Name</label>
                {{ form.full_name }}
            </div>

            <div style="margin-bottom: 18px;">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>
            
            <div style="margin-bottom: 18px;">
                <label class="form-label">Email Address</label>
                {{ form.email }}
            </div>
            
            <div style="margin-bottom: 28px;">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 15px; box-shadow: var(--shadow-blue);">Register</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            <a href="{% url 'core:login' %}" style="color: #0d6efd; text-decoration: none;">Already have an account? Login</a>
        </div>
    </div>
</div>
{% endblock %}
