{% extends "base.html" %}
{% block title %}Add Report{% endblock %}
{% block content %}
<h2>Add Report Ticket</h2>
<form method="post">
    {% csrf_token %}
    <label>Reporter:</label>
    <select name="reporter">
        {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
        {% endfor %}
    </select><br>

    <label>Reported User (optional):</label>
    <select name="reported_user">
        <option value="">--None--</option>
        {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
        {% endfor %}
    </select><br>

    <label>Reason:</label>
    <input type="text" name="reason_text" required><br>

    <button type="submit">Add Report</button>
</form>
{% endblock %}
