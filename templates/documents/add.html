{% extends "base.html" %}
{% block title %}Add Document{% endblock %}
{% block content %}
<h2>Add Identity Document</h2>
<form method="post">
    {% csrf_token %}
    <label>User:</label>
    <select name="user">
        {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
        {% endfor %}
    </select><br>

    <label>Document Type:</label>
    <input type="text" name="document_type" required><br>

    <label>Document Number:</label>
    <input type="text" name="document_number" required><br>

    <label>Expiration Date:</label>
    <input type="date" name="expiration_date"><br>

    <button type="submit">Add Document</button>
</form>
{% endblock %}
