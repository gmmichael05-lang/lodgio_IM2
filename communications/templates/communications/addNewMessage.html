{% extends "core/base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 85vh;">
    <div class="card" style="width: 100%; max-width: 500px; animation: popIn 0.3s ease both;">
        <h1 style="text-align: center; color: var(--navy-900); font-weight: 800; font-size: 26px; margin-bottom: 24px;">Send Message</h1>
        
        {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for message in messages %}
                    <div class="status-badge" style="display: block; text-align: center; font-size: 14px; padding: 12px; background-color: var(--brand-100); color: var(--brand-700);">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 18px;">
                <label class="form-label" style="font-weight: 600; color: var(--navy-800);">Receiver</label>
                {{ form.receiver }}
            </div>

            <div style="margin-bottom: 28px;">
                <label class="form-label" style="font-weight: 600; color: var(--navy-800);">Message Content</label>
                {{ form.content }}
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 15px; box-shadow: var(--shadow-blue);">Send Message</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            <a href="{% url 'core:index' %}" style="color: #0d6efd; text-decoration: none;">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
