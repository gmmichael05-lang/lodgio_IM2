{% extends "core/base.html" %}

{% block content %}
<div style="padding: 20px;">
    <h1>Add New Calendar Block</h1>

    <form method="POST">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <br>
        <input type="submit" value="Save Calendar Block">
    </form>

    <br>
    <a href="{% url 'listings:index' %}">Back to Listings</a>
</div>
{% endblock %}
