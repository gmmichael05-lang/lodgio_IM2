<!DOCTYPE html>
<html>
<head>
    <title>Login - Discovery Module</title>
</head>
<body>
    <div>
        <h1>Login</h1>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <p>
                <label>Email Address</label><br>
                {{ form.email }}
            </p>
            <p>
                <label>Password</label><br>
                {{ form.password }}
            </p>
            <p>
                <button type="submit">Log In</button>
            </p>
        </form>
    </div>
</body>
</html>
